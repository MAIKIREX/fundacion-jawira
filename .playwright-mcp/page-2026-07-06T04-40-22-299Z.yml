          - heading "Nuestra Misión" [level=3] [ref=e137]
        - paragraph [ref=e138]: Promover el desarrollo integral y sostenible de comunidades vulnerables en el Departamento de La Paz, mediante la articulación de tecnología productiva, educación y salud. Buscamos generar oportunidades a través de la investigación, innovación y proyectos participativos que fomenten la equidad, inclusión y empoderamiento con un enfoque interdisciplinario.
      - generic [ref=e139]:
        - generic [ref=e140]:
          - img [ref=e142]
          - heading "Nuestra Visión" [level=3] [ref=e145]
        - paragraph [ref=e146]: Ser una institución líder en el Departamento de La Paz, reconocida por su innovación integral, impacto social transformador y contribución a la equidad territorial. Aspiramos a ser un modelo de organización inclusiva que articule actores públicos, privados y comunitarios para construir una Bolivia más justa, equitativa y sostenible.
