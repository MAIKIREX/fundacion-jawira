        - text: Nuestro nombre
        - heading "¿Qué significa JAWIRA?" [level=2] [ref=e84]
      - generic [ref=e85]:
        - paragraph [ref=e86]: JAWIRA significa “río” en aymara, uno de los idiomas originarios de Bolivia. Esta palabra no es solo una etiqueta, sino una metáfora profunda de nuestra filosofía institucional.
        - paragraph [ref=e87]: Un río representa el flujo de vida, la conexión continua entre diferentes espacios, y la capacidad de generar oportunidades a su paso. De la misma manera, la Fundación JAWIRA actúa como un cauce que canaliza tecnología productiva, educación y salud hacia comunidades vulnerables.
        - paragraph [ref=e88]: Así como el río nutre la tierra y conecta ecosistemas, nuestra fundación busca nutrir el potencial humano, conectar actores institucionales y crear caminos hacia el desarrollo sostenible e integral.
